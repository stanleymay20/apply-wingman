# Merging to GitHub does NOT deploy anything to the Supabase backend by
# itself — edge functions and migrations otherwise only ship when deployed
# through Lovable (see CLAUDE.md, "how the backend actually deploys").
# This workflow closes that gap automatically once credentials exist.
#
# Repository secrets (Settings → Secrets and variables → Actions) — either
# tier unlocks automation:
#   SUPABASE_DB_URL        – Postgres connection string (direct or session
#                            pooler on port 5432, NOT the transaction pooler
#                            on 6543). Enough on its own to auto-apply
#                            migrations; no Supabase account token needed.
#   SUPABASE_ACCESS_TOKEN  – personal access token
#                            (supabase.com/dashboard/account/tokens); needed
#                            for edge function deploys. Requires the project
#                            to be visible in a Supabase account you control.
#   SUPABASE_DB_PASSWORD   – database password; only used for the linked
#                            `db push` fallback when SUPABASE_DB_URL is unset.
#
# If no secrets are configured, the workflow skips with a notice instead of
# failing, since Lovable Cloud projects may not expose these credentials.

name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths: ['supabase/**']
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Check credentials
        id: creds
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "token=true" >> "$GITHUB_OUTPUT"
          else
            echo "token=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "dbpass=true" >> "$GITHUB_OUTPUT"
          else
            echo "dbpass=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "dburl=true" >> "$GITHUB_OUTPUT"
          else
            echo "dburl=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] && [ -z "$SUPABASE_DB_URL" ]; then
            echo "::notice::No Supabase credentials configured — skipping backend deploy. Deploy this change through Lovable instead (see CLAUDE.md)."
          elif [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::notice::SUPABASE_DB_URL is set but SUPABASE_ACCESS_TOKEN is not — migrations will be applied, but edge functions must still be deployed through Lovable."
          fi

      - name: Checkout
        if: steps.creds.outputs.token == 'true' || steps.creds.outputs.dburl == 'true'
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        if: steps.creds.outputs.token == 'true' || steps.creds.outputs.dburl == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations (direct connection)
        if: steps.creds.outputs.dburl == 'true'
        run: supabase db push --db-url "$SUPABASE_DB_URL"

      - name: Link project
        if: steps.creds.outputs.token == 'true'
        run: supabase link --project-ref jlsoiujwcjgmvijcmvas

      - name: Apply migrations (linked fallback)
        if: steps.creds.outputs.dburl == 'false' && steps.creds.outputs.token == 'true' && steps.creds.outputs.dbpass == 'true'
        run: supabase db push

      - name: Deploy edge functions
        if: steps.creds.outputs.token == 'true'
        run: supabase functions deploy
